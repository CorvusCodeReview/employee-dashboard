<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In · Employee Portal</title>
  <link rel="icon" href="/static/images/favicon.ico">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      background: #f3f6fb;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .login-wrap {
      width: 100%;
      max-width: 390px;
    }
    .login-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(12,31,71,.09), 0 16px 40px rgba(12,31,71,.06);
      padding: 40px 36px 32px;
    }
    .login-logo {
      display: block;
      height: 34px;
      margin: 0 auto 20px;
      object-fit: contain;
    }
    .login-title {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      color: #0c1f47;
      margin-bottom: 4px;
    }
    .login-sub {
      text-align: center;
      font-size: 13.5px;
      color: #64748b;
      margin-bottom: 28px;
    }
    .form-label { font-size: 12.5px; font-weight: 600; color: #475569; margin-bottom: 5px; }
    .form-control {
      border-radius: 8px;
      font-size: 14px;
      border-color: #cbd5e1;
      padding: 10px 12px;
      transition: border-color .15s, box-shadow .15s;
    }
    .form-control:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }
    /* pw toggle */
    .pw-wrap { position: relative; }
    .pw-wrap .form-control { padding-right: 42px; }
    .pw-toggle {
      position: absolute;
      right: 1px; top: 1px;
      height: calc(100% - 2px);
      width: 40px;
      background: none;
      border: none;
      border-radius: 0 8px 8px 0;
      color: #94a3b8;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      transition: color .15s;
    }
    .pw-toggle:hover { color: #2563eb; }
    /* error */
    .error-box {
      background: #fee2e2;
      border-radius: 8px;
      padding: 10px 13px;
      font-size: 13px;
      color: #dc2626;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    /* submit btn */
    .btn-login {
      width: 100%;
      background: #0c1f47;
      border: none;
      border-radius: 9px;
      color: #fff;
      font-size: 14.5px;
      font-weight: 600;
      padding: 11px;
      cursor: pointer;
      transition: background .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      margin-top: 4px;
    }
    .btn-login:hover { background: #16326e; }
    .forgot-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: #2563eb;
      text-decoration: none;
    }
    .forgot-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <img src="/static/images/logo.png" class="login-logo" alt="Logo"
           onerror="this.style.display='none'">
      <div class="login-title">Welcome back</div>
      <div class="login-sub">Sign in to your employee portal</div>

      {% if error %}
      <div class="error-box">
        <i class="bi bi-exclamation-circle-fill"></i> {{ error }}
      </div>
      {% endif %}

      <form method="POST" autocomplete="off" novalidate>
        <div class="mb-3">
          <label class="form-label" for="username">Username</label>
          <input class="form-control" id="username" name="username"
                 placeholder="Enter your username" required autofocus
                 value="{{ request.form.get('username', '') }}">
        </div>

        <div class="mb-4">
          <label class="form-label" for="password">Password</label>
          <div class="pw-wrap">
            <input class="form-control" id="password" name="password"
                   type="password" placeholder="Enter your password" required>
            <button type="button" class="pw-toggle" id="pw-toggle-btn"
                    onclick="togglePw()" title="Show / hide password">
              <i class="bi bi-eye" id="pw-icon"></i>
            </button>
          </div>
        </div>

        <button class="btn-login" type="submit">
          <i class="bi bi-box-arrow-in-right"></i> Sign In
        </button>
      </form>

      <a href="/reset_password" class="forgot-link">Forgot password?</a>
    </div>
  </div>

  <script>
    function togglePw() {
      var input = document.getElementById('password');
      var icon  = document.getElementById('pw-icon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'bi bi-eye';
      }
    }
  </script>
</body>
</html>
