<!DOCTYPE html>
<html>
<head>
    <title>Employee Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fa;
        }
        .navbar {
            background-color: #1f2937;
        }
        .navbar-brand, .nav-link {
            color: white !important;
        }
        .card {
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">Dashboard</a>

        <div>
            <a class="nav-link d-inline" href="/submit_report">Submit</a>
            <a class="nav-link d-inline" href="/my_reports">My Reports</a>

            {% if current_user.role in ['manager','senior'] %}
                <a class="nav-link d-inline" href="/all_reports">All Reports</a>
                <a class="nav-link d-inline" href="/manage_tasks">Manage Tasks</a>
            {% endif %}

            <a class="nav-link d-inline" href="/logout">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

</body>
</html>
