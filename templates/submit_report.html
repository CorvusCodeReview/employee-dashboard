<!DOCTYPE html>
<html>
<head>
    <title>Submit Report</title>

    <script>
        function addRow() {
            let container = document.getElementById("tasks-container");

            let newRow = `
            <div style="margin-bottom:10px;">
                <label>Task:</label>
                <select name="task">
                    {% for task in tasks %}
                        <option value="{{ task.id }}">
                            {{ task.name }} - (Typically: {{ task.suggested_time }})
                        </option>
                    {% endfor %}
                </select>

                <label>Time:</label>
                <input type="text" name="time" placeholder="e.g. 1.5 hrs">

                <label>Notes:</label>
                <input type="text" name="notes" placeholder="Optional notes">
            </div>
            `;

            container.insertAdjacentHTML('beforeend', newRow);
        }
    </script>

</head>
<body>

<h2>Submit Daily Report</h2>

<form method="POST">

<div id="tasks-container">

{% if existing_tasks %}
    {% for row in existing_tasks %}
        <div style="margin-bottom:10px;">
            <label>Task:</label>
            <select name="task">
                {% for task in tasks %}
                    <option value="{{ task.id }}"
                        {% if task.id == row.task_id|int %} selected {% endif %}>
                        {{ task.name }} - (Typically: {{ task.suggested_time }})
                    </option>
                {% endfor %}
            </select>

            <label>Time:</label>
            <input type="text" name="time" value="{{ row.actual_time }}" placeholder="e.g. 1.5 hrs">

            <label>Notes:</label>
            <input type="text" name="notes" value="{{ row.notes }}" placeholder="Optional notes">
        </div>
    {% endfor %}
{% else %}
    <div style="margin-bottom:10px;">
        <label>Task:</label>
        <select name="task">
            {% for task in tasks %}
                <option value="{{ task.id }}">
                    {{ task.name }} - (Typically: {{ task.suggested_time }})
                </option>
            {% endfor %}
        </select>

        <label>Time:</label>
        <input type="text" name="time" placeholder="e.g. 1.5 hrs">

        <label>Notes:</label>
        <input type="text" name="notes" placeholder="Optional notes">
    </div>
{% endif %}

</div>

<br>

<button type="button" onclick="addRow()">+ Add Task</button>

<br><br>

<button type="submit">Submit</button>

</form>

</body>
</html>
