{% extends 'base.html' %}

{% block content %}

<h3 class="page-title">Admin Panel</h3>

<!-- ADD USER -->
<div class="card p-3 mb-3">

<h5>Add New User</h5>

<form method="POST" action="/add_user" class="row g-2">

    <div class="col-md-4">
        <input name="username" class="form-control" placeholder="Username" required>
    </div>

    <div class="col-md-3">
        <input name="password" class="form-control" placeholder="Password" required>
    </div>

    <div class="col-md-3">
        <select name="role" class="form-control">
            <option value="employee">Employee</option>
            <option value="senior">Senior</option>
            <option value="manager">Manager</option>
        </select>
    </div>

    <div class="col-md-2">
        <button class="btn btn-primary w-100">Add</button>
    </div>

</form>

</div>

<!-- USERS TABLE -->
<div class="card p-3">

<table class="table table-striped table-hover">

<tr>
    <th>Username</th>
    <th>Role</th>
    <th>Actions</th>
</tr>

{% for user in users %}
<tr>
    <td>{{ user.username }}</td>
    <td>{{ user.role }}</td>
    <td>

        <a href="/reset_user_password/{{ user.id }}" class="btn btn-sm btn-warning">Reset</a>

        {% if user.id != current_user.id %}
        <a href="/delete_user/{{ user.id }}" class="btn btn-sm btn-danger">Delete</a>
        {% endif %}

    </td>
</tr>
{% endfor %}

</table>

</div>

{% endblock %}
