{% extends 'base.html' %}

{% block content %}

<h3 class="page-title">Submit Report</h3>

<div class="card p-4">

<form method="POST">

<div id="task-container">

{% for t in existing_tasks or [None] %}
<div class="row mb-3">

    <div class="col-md-4">
        <select name="task" class="form-control" required>
            {% for task in tasks %}
            <option value="{{ task.id }}"
            {% if t and task.id == t.task_id %}selected{% endif %}>
            {{ task.name }} ({{ task.suggested_time }})
            </option>
            {% endfor %}
        </select>
    </div>

    <div class="col-md-3">
        <input name="time" class="form-control"
        value="{{ t.actual_time if t else '' }}" placeholder="Time">
    </div>

    <div class="col-md-4">
        <input name="notes" class="form-control"
        value="{{ t.notes if t else '' }}" placeholder="Notes">
    </div>

    <div class="col-md-1">
        <button type="button" class="btn btn-danger" onclick="removeRow(this)">X</button>
    </div>

</div>
{% endfor %}

</div>

<button type="button" class="btn btn-secondary" onclick="addRow()">+ Add Task</button>

<br><br>

<button class="btn btn-primary">Submit</button>

</form>

</div>

<script>
function addRow() {
    let container = document.getElementById('task-container');
    let firstRow = container.children[0];
    let row = firstRow.cloneNode(true);

    // reset select
    let select = row.querySelector('select');
    select.selectedIndex = 0;

    // reset inputs
    row.querySelectorAll('input').forEach(i => i.value = '');

    container.appendChild(row);
}

function removeRow(btn) {
    let container = document.getElementById('task-container');

    // prevent deleting last row
    if (container.children.length > 1) {
        btn.closest('.row').remove();
    }
}
</script>

{% endblock %}
