{% extends 'base.html' %}

{% block content %}

<h3 class="page-title">Report Details</h3>

<div class="card p-3 mt-3">

<p><strong>Employee:</strong> {{ user.username }}</p>
<p><strong>Date:</strong> {{ report.date }}</p>

</div>

<div class="card mt-3 p-3">

<table class="table table-bordered table-hover">
    <tr>
        <th>Task</th>
        <th>Time</th>
        <th>Notes</th>
    </tr>

    {% if tasks %}
        {% for t in tasks %}
        <tr>
            <td>{{ t.name }}</td>
            <td>{{ t.time }}</td>
            <td>{{ t.notes }}</td>
        </tr>
        {% endfor %}
    {% else %}
        <tr>
            <td colspan="3" class="text-center text-muted">
                No tasks found
            </td>
        </tr>
    {% endif %}
</table>

</div>

{% endblock %}
