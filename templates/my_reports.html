{% extends 'base.html' %}

{% block content %}

<h3 class="page-title">My Reports</h3>

<div class="card p-3">

<table class="table table-hover">
    <tr>
        <th>Date</th>
        <th>Status</th>
        <th>Action</th>
    </tr>

    {% for r in reports %}
    <tr>
        <td>{{ r.date }}</td>
        <td>
            {% if r.date == today %}
                <span class="text-success">Editable</span>
            {% else %}
                <span class="text-muted">Locked</span>
            {% endif %}
        </td>
        <td>
            <a href="/report/{{ r.id }}" class="btn btn-sm btn-info">View</a>
        </td>
    </tr>
    {% endfor %}
</table>

</div>

{% endblock %}
