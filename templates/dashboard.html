{% extends 'base.html' %}

{% block content %}

<h3 class="page-title mb-4">
    Welcome, {{ current_user.username }}
</h3>

<div class="row g-4 justify-content-start">

    <!-- Submit Report -->
    <div class="col-md-4">
        <a href="/submit_report" class="text-decoration-none">
            <div class="card p-4 text-center">
                <div style="font-size: 28px;">📝</div>
                <h5 style="color:#0c1f47; font-weight:600;">Submit Report</h5>
                <p class="text-muted small">Log your daily work</p>
            </div>
        </a>
    </div>

    <!-- My Reports -->
    <div class="col-md-4">
        <a href="/my_reports" class="text-decoration-none">
            <div class="card p-4 text-center">
                <div style="font-size: 28px;">📄</div>
                <h5 style="color:#0c1f47; font-weight:600;">My Reports</h5>
                <p class="text-muted small">View your submissions</p>
            </div>
        </a>
    </div>

    {% if current_user.role in ['manager','senior'] %}
    <!-- All Reports -->
    <div class="col-md-4">
        <a href="/all_reports" class="text-decoration-none">
            <div class="card p-4 text-center">
                <div style="font-size: 28px;">📊</div>
                <h5 style="color:#0c1f47; font-weight:600;">All Reports</h5>
                <p class="text-muted small">Team overview</p>
            </div>
        </a>
    </div>
    {% endif %}

</div>

{% endblock %}
