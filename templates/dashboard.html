<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
</head>
<body>

<h2>Welcome {{ current_user.username }}</h2>
<p>Role: {{ current_user.role }}</p>

<hr>

<h3>Menu</h3>

<ul>
    <li><a href="/submit_report">Submit Report</a></li>
    <li><a href="/my_reports">My Reports</a></li>

    {% if current_user.role in ['manager', 'senior'] %}
        <li><a href="/all_reports">All Reports</a></li>
    {% endif %}

    <li><a href="/logout">Logout</a></li>
</ul>

</body>
</html>
